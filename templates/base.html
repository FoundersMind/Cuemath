<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Cuemath screener{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="bg-light cm-recruiter">
    <nav class="navbar navbar-dark bg-dark shadow-sm">
      <div class="container">
        <span class="navbar-brand mb-0 h1 fs-5 cm-brand">
          <span class="cm-brand__mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M7 16c3.5 2.7 6.7 2.7 10 0"
                stroke="white"
                stroke-opacity="0.95"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M7.5 8.5h9"
                stroke="white"
                stroke-opacity="0.85"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M8.2 12h7.6"
                stroke="white"
                stroke-opacity="0.75"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </span>
          {% block nav_title %}Recruiter{% endblock %}
        </span>
        {% if user.is_authenticated %}
          <span class="navbar-text text-light me-2">{{ user.username }}</span>
          <form method="post" action="{% url 'recruiter_logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">Log out</button>
          </form>
        {% endif %}
      </div>
    </nav>
    <main class="container py-4">{% block content %}{% endblock %}</main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
